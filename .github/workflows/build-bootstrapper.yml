name: Build Coco components

on:
  workflow_dispatch:
  push:
    paths:
      - 'bootstrap/**'
      - 'engine/**'
      - 'fabric-mod/**'
      - 'tests/**'
      - 'tools/**'
      - 'fullbody.png'
      - 'reynaico.ico'
      - 'CocoUpdater.channel.json'
      - '.github/workflows/build-bootstrapper.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'

      - name: Build Session Bridge and Pack Gate
        shell: powershell
        run: fabric-mod/gradlew.bat -p fabric-mod build

      - name: Install ps2exe
        shell: powershell
        run: Install-Module ps2exe -Scope CurrentUser -Force

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            [void][scriptblock]::Create([IO.File]::ReadAllText($_.FullName))
          }

      - name: Build updater executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $template = [IO.File]::ReadAllText((Resolve-Path 'bootstrap/CocoBootstrapper.ps1'))
          $image = [Convert]::ToBase64String([IO.File]::ReadAllBytes((Resolve-Path 'fullbody.png')))
          [IO.File]::WriteAllText('bootstrap.generated.ps1', $template.Replace('__FULLBODY_BASE64__', $image), (New-Object Text.UTF8Encoding($true)))
          Invoke-ps2exe -InputFile bootstrap.generated.ps1 -OutputFile dist/CocoUpdater.exe -Title 'Coco Minecraft Updater' -Product 'Coco Minecraft Updater' -Version '0.5.29.0' -NoConsole -IconFile reynaico.ico

      - name: Upload initial distribution
        uses: actions/upload-artifact@v4
        with:
          name: coco-updater-bootstrapper
          path: dist/CocoUpdater.exe
